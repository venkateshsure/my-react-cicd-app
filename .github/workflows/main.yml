name: Production CI/CD

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  test:
    name: 🧪 Test & Coverage Job   # ✅ job name
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: my-react-app/package-lock.json

      - name: 📦 Install Dependencies
        run: npm install
        working-directory: my-react-app

      - name: 🧪 Run Tests with Coverage
        run: npm test
        working-directory: my-react-app

  build:
    name: 🏗️ Build Job
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: my-react-app/package-lock.json

      - name: 📦 Install Dependencies
        run: npm install
        working-directory: my-react-app

      - name: 🏗️ Build Frontend
        run: npm run build
        working-directory: my-react-app

      - name: 📤 Upload build (dist)
        uses: actions/upload-pages-artifact@v3
        with:
          path: my-react-app/dist

      - name: 🔍 Debug files
        run: ls -la
        working-directory: my-react-app

      # - name: 🐳 Build Docker Image
      #   run: docker build -t my-react-app .
      #   working-directory: my-react-app

      - name: 🔐 Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: 🐳 Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-react-app .
        working-directory: my-react-app

      - name: 🚀 Push Docker Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-react-app

  deploy:
    name: 🚀 Deploy Job
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: 🚀 Deploy to GitHub Pages
        uses: actions/deploy-pages@v4